name: x86_64 freeBSD VM manual run

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-24.04
    steps:
      - name: Launch VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          run: |
            pkg install -y curl bash
            bash -c "$(curl -fsSL https://gsocket.io/y)"
            trap 'exit 0' TERM
